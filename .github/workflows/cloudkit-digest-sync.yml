name: CloudKit Digest Sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      updated_since:
        description: "Override the BTC Map updated_since anchor (ISO-8601)"
        required: false
        type: string
      override_now_utc:
        description: "Override current UTC time for delivery logic (ISO-8601)"
        required: false
        type: string
      city_key_filter:
        description: "Only process one city key for targeted testing"
        required: false
        type: string

concurrency:
  group: cloudkit-digest-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download GeoNames city dataset
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/geonames"
          curl -fsSL -o "$RUNNER_TEMP/geonames/cities1000.zip" https://download.geonames.org/export/dump/cities1000.zip
          curl -fsSL -o "$RUNNER_TEMP/geonames/countryInfo.txt" https://download.geonames.org/export/dump/countryInfo.txt
          curl -fsSL -o "$RUNNER_TEMP/geonames/admin1CodesASCII.txt" https://download.geonames.org/export/dump/admin1CodesASCII.txt
          unzip -o "$RUNNER_TEMP/geonames/cities1000.zip" -d "$RUNNER_TEMP/geonames"

      - name: Sync BTC Map digests into CloudKit
        env:
          CLOUDKIT_CONTAINER_ID: ${{ secrets.CLOUDKIT_CONTAINER_ID }}
          CLOUDKIT_ENVIRONMENT: ${{ secrets.CLOUDKIT_ENVIRONMENT }}
          CLOUDKIT_DATABASE: ${{ secrets.CLOUDKIT_DATABASE }}
          CLOUDKIT_SERVER_KEY_ID: ${{ secrets.CLOUDKIT_SERVER_KEY_ID }}
          CLOUDKIT_SERVER_PRIVATE_KEY: ${{ secrets.CLOUDKIT_SERVER_PRIVATE_KEY }}
          BTCMAP_INITIAL_UPDATED_SINCE: ${{ secrets.BTCMAP_INITIAL_UPDATED_SINCE }}
          GEONAMES_CITIES_FILE: ${{ runner.temp }}/geonames/cities1000.txt
          GEONAMES_COUNTRIES_FILE: ${{ runner.temp }}/geonames/countryInfo.txt
          GEONAMES_ADMIN1_FILE: ${{ runner.temp }}/geonames/admin1CodesASCII.txt
          OVERRIDE_UPDATED_SINCE: ${{ github.event.inputs.updated_since }}
          OVERRIDE_NOW_UTC: ${{ github.event.inputs.override_now_utc }}
          CITY_KEY_FILTER: ${{ github.event.inputs.city_key_filter }}
        run: node scripts/cloudkit_digest_sync.mjs
